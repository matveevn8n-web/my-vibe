<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vibe Project - Sergey</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 50px;
            border: 2px solid #00f2ff;
            border-radius: 20px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00f2ff;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f2ff;
        }
        p {
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SERGEY VIBE</h1>
        <p>Проект успешно запущен в космос 🚀</p>
    </div>
</body>
</html>
