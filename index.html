<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vibe Project - Sergey</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 50px;
            border: 2px solid #00f2ff;
            border-radius: 20px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00f2ff;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f2ff;
        }
        p {
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SERGEY VIBE</h1>
        <p>Проект успешно запущен в космос 🚀</p>
        
        <button onclick="changeColor()" style="margin-top: 20px; background: transparent; border: 1px solid #00f2ff; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: inherit;">
          Сменить вайб
        </button>
    </div>

    <script>
      function changeColor() {
        const colors = ['#00f2ff', '#ff00ff', '#00ff88', '#ffcc00', '#ff4444'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        // Меняем цвет рамки и свечения
        const card = document.querySelector('.card');
        card.style.borderColor = randomColor;
        card.style.boxShadow = `0 0 20px ${randomColor}, inset 0 0 10px ${randomColor}`;
        
        // Меняем цвет текста
        document.querySelector('h1').style.textShadow = `0 0 10px ${randomColor}`;
        document.querySelector('button').style.borderColor = randomColor;
      }
    </script>
</body>
</html>
