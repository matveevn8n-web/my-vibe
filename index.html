<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vibe Project - Sergey</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 50px;
            border: 2px solid #00f2ff;
            border-radius: 20px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00f2ff;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f2ff;
        }
        p {
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <audio id="click-sound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>
    <div class="card">
        <h1>SERGEY VIBE</h1>
        <p>Проект успешно запущен в космос 🚀</p>
        
        <button onclick="changeColor()" style="margin-top: 20px; background: transparent; border: 1px solid #00f2ff; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: inherit;">
          Сменить вайб
        </button>
    </div>

    <script>
        let count = 0; // Создаем переменную, которая начинается с нуля
      function changeColor() {
        count = count + 1; // Увеличиваем счет на 1 при каждом нажатии
document.querySelector('h1').innerText = `VIBE CLICKS: ${count}`; // Выводим счет вместо заголовка
    // 1. Сначала подгружаем звук
    const audio = document.getElementById('click-sound');
    
    // 2. Наши списки
    const colors = ['#00f2ff', '#ff00ff', '#00ff88', '#ffcc00', '#ff4444', '#ffffff'];
    const phrases = [
        'Вайб пойман! 🌊',
        'Система перегружена стилем 😎',
        'Космос на связи 🚀',
        'Матрица обновлена 🤖',
        'Матвеев',
        'Чистый кайф... ✨'
    ];
    
    // 3. Выбираем случайные данные
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
    
    // 4. Меняем стили на странице
    const card = document.querySelector('.card');
    card.style.borderColor = randomColor;
    card.style.boxShadow = `0 0 20px ${randomColor}, inset 0 0 10px ${randomColor}`;
    document.querySelector('h1').style.textShadow = `0 0 10px ${randomColor}`;
    document.querySelector('button').style.borderColor = randomColor;
    
    // 5. Меняем текст
    document.querySelector('p').innerText = randomPhrase;
    document.querySelector('p').style.color = randomColor;

    // 6. Играем звук
    if(audio) {
        audio.currentTime = 0;
        audio.play();
    }
}
</script>
</body>
</html>
